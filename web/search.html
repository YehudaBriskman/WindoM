<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WindoM Search</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }
    /* backdrop-filter cannot blur through iframe boundaries — replace with solid colours */
    .search-overlay-backdrop {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      background: rgba(0, 0, 0, 0.62) !important;
    }
    .search-overlay-input-row {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      background: rgba(14, 14, 14, 0.96) !important;
    }
    .search-dropdown {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/search.tsx"></script>
</body>
</html>

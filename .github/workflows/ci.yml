name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  ci-backend:
    name: Backend — lint / typecheck / test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: windom
          POSTGRES_PASSWORD: windom
          POSTGRES_DB: windom_test
        ports:
          - 5433:5432  # Match .env.test which setup.ts loads with override:true
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run migrations on test DB
        run: npx drizzle-kit migrate
        env:
          DATABASE_URL: postgresql://windom:windom@localhost:5433/windom_test

      - name: Run tests
        run: npm test
        env:
          # Minimal env required by config.ts Zod schema
          DATABASE_URL: postgresql://windom:windom@localhost:5432/windom
          DATABASE_URL_TEST: postgresql://windom:windom@localhost:5432/windom_test
          JWT_ACCESS_SECRET: ci-access-secret-at-least-32-chars-long
          REFRESH_TOKEN_SECRET: ci-refresh-secret-at-least-32-chars
          TOKEN_ENC_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          NODE_ENV: test

  # ── Web extension ─────────────────────────────────────────────────────────
  ci-web:
    name: Web — lint / typecheck / build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_BACKEND_URL: https://api.windom.app
